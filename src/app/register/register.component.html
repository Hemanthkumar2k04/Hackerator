<body [ngClass]="{ 'dark-mode': isDarkMode }">
    <div class="register-container">
      <h1>Register to continue</h1>
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <!-- Username -->
        <label for="username">Username:</label>
        <input type="text" name="username" id="username" formControlName="username" />
        <div *ngIf="registerForm.get('username')?.invalid && registerForm.get('username')?.touched" style="color: red;">
          Username is required.
        </div>
  
        <!-- Password -->
        <label for="password">Password:</label>
        <input id="password" type="password" formControlName="password" />
        <div *ngIf="registerForm.get('password')?.errors?.['minlength']" style="color: red;">
          Password must be at least 6 characters long.
        </div>
  
        <!-- Confirm Password -->
        <label for="confirmPassword">Confirm Password:</label>
        <input id="confirmPassword" type="password" formControlName="confirmPassword" />
        <div *ngIf="registerForm.errors?.['passwordsMismatch'] && registerForm.get('confirmPassword')?.touched" style="color: red;">
          <small class="error">Passwords do not match.</small>
        </div>
  
        <!-- Submit Button -->
        <button type="submit" [disabled]="registerForm.invalid">Register</button>
      </form>
  
      <!-- Login Link -->
      <div class="register-link">
        <p>Already have an account? <a [routerLink]="['/login']">Login</a></p>
      </div>
  
      <!-- Dark Mode Toggle Icon -->
      <div class="theme-toggle-icon" (click)="toggleDarkMode()">
        <img *ngIf="!isDarkMode" src="https://www.pngall.com/wp-content/uploads/5/Crescent-Moon-PNG-Picture.png" alt="Sun Icon" class="theme-icon">
        <img *ngIf="isDarkMode" src="https://www.freeiconspng.com/thumbs/sun-icon/sun-icon-26.png" alt="Moon Icon" class="theme-icon">
      </div>
    </div>
  </body>
